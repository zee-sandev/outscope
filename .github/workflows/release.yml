name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - '@outscope/nova'
          - '@outscope/nova-fn'
          - '@outscope/cli'
          - 'all'
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @outscope/nova test && pnpm --filter @outscope/nova-fn test && pnpm --filter @outscope/cli test

      - name: Type check packages
        run: pnpm --filter @outscope/nova check-types && pnpm --filter @outscope/nova-fn check-types && pnpm --filter @outscope/cli check-types

      - name: Build packages
        run: pnpm --filter @outscope/nova build && pnpm --filter @outscope/nova-fn build && pnpm --filter @outscope/cli build

      - name: Create changeset for selected package
        if: github.event_name == 'workflow_dispatch'
        run: |
          PACKAGE="${{ github.event.inputs.package }}"
          VERSION_TYPE="${{ github.event.inputs.version_type }}"

          if [ "$PACKAGE" = "all" ]; then
            cat <<EOF > .changeset/release-all.md
          ---
          "@outscope/nova": $VERSION_TYPE
          "@outscope/nova-fn": $VERSION_TYPE
          "@outscope/cli": $VERSION_TYPE
          ---

          Release $VERSION_TYPE version for all packages
          EOF
          elif [ "$PACKAGE" = "@outscope/nova" ]; then
            cat <<EOF > .changeset/release-nova.md
          ---
          "@outscope/nova": $VERSION_TYPE
          ---

          Release $VERSION_TYPE version for @outscope/nova
          EOF
          elif [ "$PACKAGE" = "@outscope/nova-fn" ]; then
            cat <<EOF > .changeset/release-nova-fn.md
          ---
          "@outscope/nova-fn": $VERSION_TYPE
          ---

          Release $VERSION_TYPE version for @outscope/nova-fn
          EOF
          else
            cat <<EOF > .changeset/release-cli.md
          ---
          "@outscope/cli": $VERSION_TYPE
          ---

          Release $VERSION_TYPE version for @outscope/cli
          EOF
          fi

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "## 🚀 Packages Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following packages were published:" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | "- **\(.name)@\(.version)**"' >> $GITHUB_STEP_SUMMARY

      - name: Update @outscope/nova-fn version in monorepo-lite template
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name == "@outscope/nova-fn") | .version')

          if [ -n "$VERSION" ]; then
            echo "Updating @outscope/nova-fn to ^$VERSION in monorepo-lite template"
            VERSION="$VERSION" node -e "
              const fs = require('fs');
              const path = 'apps/monorepo-lite/apps/api/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.dependencies['@outscope/nova-fn'] = '^' + process.env.VERSION;
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            "
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add apps/monorepo-lite/apps/api/package.json
            git commit -m "chore: update @outscope/nova-fn to ^$VERSION in template"
            git push
          fi
